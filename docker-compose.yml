version: "3.8"

services:
  mongo:
    image: mongo
    container_name: mongo_db
    ports:
      - "27017:27017"

  backend:
    build: ./backend
    container_name: backend_app
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/studentDB
    depends_on:
      - mongo

  